<!DOCTYPE html>
<html lang="eu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FilmWeb</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  background:#f2f2f2;
}

.navbar{
  background:#111 !important;
}

.card{
  box-shadow:0 4px 8px rgba(0,0,0,0.2);
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
}

.card img{
  height:350px;
  width:100%;
  object-fit:contain;
  background:white;
}

.carousel img{
  height:450px;
  object-fit:cover;
}

footer{
  background:#111;
  color:white;
  text-align:center;
  padding:10px;
  margin-top:30px;
}
</style>
</head>

<body>

<!-- ===== MENU ===== -->
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand" href="#">🎬 FilmWeb</a>
    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="Boostrap Web-orria.html">Hasiera</a></li>
        <li class="nav-item"><a class="nav-link" href="Argazkiak.html">Filmak</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Kontaktua</a></li>
      </ul>
    </div>
  </div>
</nav>

<section id="kontaktua" class="container mt-5">

<h2 class="text-center mb-4">Kontaktua</h2>

<div class="row justify-content-center">
<div class="col-md-6">

<form>

<div class="mb-3">
<label class="form-label">Izena</label>
<input type="text" class="form-control" placeholder="Idatzi zure izena">
</div>

<div class="mb-3">
<label class="form-label">Emaila</label>
<input type="email" class="form-control" placeholder="Idatzi zure emaila">
</div>

<div class="mb-3">
<label class="form-label">Mezua</label>
<textarea class="form-control" rows="4" placeholder="Idatzi mezua"></textarea>
</div>

<div class="text-center">
<button type="submit" class="btn btn-danger">Bidali</button>
</div>

</form>

</div>
</div>

</section>

</body>
</html>
